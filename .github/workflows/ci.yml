name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: command -v shellcheck || (sudo apt-get update -qq && sudo apt-get install -y shellcheck)
      - run: find src -name "*.sh" | xargs shellcheck
      - name: Install prettier
        run: npm install -g prettier@3.8.3
      - name: Check formatting
        run: prettier --check "**/*.{json,yaml,yml,md}"

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.compute.outputs.features }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: compute
        run: |
          ALL='["claude-code","just","kiro-cli","nvidia-container-toolkit","act","gitlab-ci-local","prek"]'

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "features=$ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          FEATURES=()
          for f in claude-code just kiro-cli nvidia-container-toolkit act gitlab-ci-local prek; do
            if echo "$CHANGED" | grep -qE "^(src|test)/$f/"; then
              FEATURES+=("\"$f\"")
            fi
          done

          if [ ${#FEATURES[@]} -eq 0 ]; then
            echo 'features=[]' >> $GITHUB_OUTPUT
          else
            echo "features=[$(IFS=,; echo "${FEATURES[*]}")]" >> $GITHUB_OUTPUT
          fi

  test-autogenerated:
    needs: detect-changes
    if: needs.detect-changes.outputs.features != '[]'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        feature: ${{ fromJson(needs.detect-changes.outputs.features) }}
        base-image: [debian:bookworm, alpine:3.20]
        exclude:
          - feature: kiro-cli
            base-image: alpine:3.20
          - feature: nvidia-container-toolkit
            base-image: alpine:3.20
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test ${{ matrix.feature }} on ${{ matrix.base-image }} (autogenerated)
        run: devcontainer features test --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.base-image }} .

  test-scenarios:
    needs: detect-changes
    if: needs.detect-changes.outputs.features != '[]'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        feature: ${{ fromJson(needs.detect-changes.outputs.features) }}
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test ${{ matrix.feature }} scenarios
        run: devcontainer features test --skip-autogenerated --skip-duplicated -f ${{ matrix.feature }} .

  test-global:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test global scenarios
        run: devcontainer features test --global-scenarios-only .
