name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: command -v shellcheck || (sudo apt-get update -qq && sudo apt-get install -y shellcheck)
      - run: find src -name "*.sh" | xargs shellcheck
      - name: Install prettier
        run: npm install -g prettier@3.8.3
      - name: Check formatting
        run: prettier --check "**/*.{json,yaml,yml,md}"

  version-bump-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Ensure changed features bumped their version
        run: |
          set -e
          base="origin/${{ github.base_ref }}"
          fail=0
          for dir in src/*/; do
            feature=$(basename "$dir")
            json="src/$feature/devcontainer-feature.json"
            [ -f "$json" ] || continue

            # Any publishable file (not README, not tests) changed versus the base branch?
            changed=$(git diff --name-only "$base"...HEAD -- "src/$feature/" ":(exclude)src/$feature/README.md" ":(exclude)src/$feature/test/")
            [ -n "$changed" ] || continue

            # Brand-new feature (no metadata on base) needs no bump.
            git cat-file -e "$base:$json" 2>/dev/null || continue

            old=$(git show "$base:$json" | jq -r '.version')
            new=$(jq -r '.version' "$json")
            if [ "$old" = "$new" ]; then
              echo "::error file=$json::Feature '$feature' changed but version was not bumped (still $new). Bump it in $json."
              fail=1
            fi
          done
          exit $fail

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.compute.outputs.features }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: compute
        run: |
          ALL='["bash-language-server","claude-code","just","kiro-cli","nvidia-container-toolkit","act","gitlab-ci-local","prek","gitlab-cli","terraform-ls","agentcore","aws-sam-cli"]'

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "features=$ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          FEATURES=()
          for f in bash-language-server claude-code just kiro-cli nvidia-container-toolkit act gitlab-ci-local prek gitlab-cli terraform-ls agentcore aws-sam-cli; do
            if echo "$CHANGED" | grep -qE "^(src|test)/$f/"; then
              FEATURES+=("\"$f\"")
            fi
          done

          if [ ${#FEATURES[@]} -eq 0 ]; then
            echo 'features=[]' >> $GITHUB_OUTPUT
          else
            echo "features=[$(IFS=,; echo "${FEATURES[*]}")]" >> $GITHUB_OUTPUT
          fi

  test-autogenerated-amd64:
    needs: detect-changes
    if: needs.detect-changes.outputs.features != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature: ${{ fromJson(needs.detect-changes.outputs.features) }}
        base-image: [debian:bookworm, alpine:3.20]
        exclude:
          - feature: nvidia-container-toolkit
            base-image: alpine:3.20
          - feature: aws-sam-cli
            base-image: alpine:3.20
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test ${{ matrix.feature }} on ${{ matrix.base-image }} (autogenerated)
        run: devcontainer features test --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.base-image }} .

  test-autogenerated-arm:
    needs: [detect-changes, test-autogenerated-amd64]
    if: needs.detect-changes.outputs.features != '[]'
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        feature: ${{ fromJson(needs.detect-changes.outputs.features) }}
        base-image: [debian:bookworm, alpine:3.20]
        exclude:
          - feature: nvidia-container-toolkit
            base-image: alpine:3.20
          - feature: aws-sam-cli
            base-image: alpine:3.20
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test ${{ matrix.feature }} on ${{ matrix.base-image }} (autogenerated)
        run: devcontainer features test --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.base-image }} .

  test-scenarios-amd64:
    needs: detect-changes
    if: needs.detect-changes.outputs.features != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature: ${{ fromJson(needs.detect-changes.outputs.features) }}
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test ${{ matrix.feature }} scenarios
        run: devcontainer features test --skip-autogenerated --skip-duplicated -f ${{ matrix.feature }} .

  test-scenarios-arm:
    needs: [detect-changes, test-scenarios-amd64]
    if: needs.detect-changes.outputs.features != '[]'
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        feature: ${{ fromJson(needs.detect-changes.outputs.features) }}
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test ${{ matrix.feature }} scenarios
        run: devcontainer features test --skip-autogenerated --skip-duplicated -f ${{ matrix.feature }} .

  test-global-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test global scenarios
        run: devcontainer features test --global-scenarios-only .

  test-global-arm:
    needs: test-global-amd64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test global scenarios
        run: devcontainer features test --global-scenarios-only .
