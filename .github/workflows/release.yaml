name: "Release dev container features & Generate Documentation"

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'release' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect features to publish
        id: detect
        run: |
          set -e
          mkdir -p /tmp/publish-src
          for dir in src/*/; do
            feature=$(basename "$dir")
            version=$(jq -r '.version' "src/$feature/devcontainer-feature.json")
            ref="ghcr.io/${{ github.repository }}/$feature:$version"
            if docker manifest inspect "$ref" > /dev/null 2>&1; then
              echo "Skipping $feature@$version (already published)"
            else
              echo "Queuing $feature@$version for publish"
              cp -r "src/$feature" "/tmp/publish-src/$feature"
            fi
          done
          count=$(ls /tmp/publish-src | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - name: "Publish Features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create PR for Documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config pull.rebase false
          branch="automated-documentation-update-$GITHUB_RUN_ID"
          git checkout -b "$branch"
          git add '*/**/README.md'
          git commit -m 'Automated documentation update [skip ci]' || exit 0
          git push origin "$branch"
          gh pr create --title 'Automated documentation update' --body 'Automated documentation update'
